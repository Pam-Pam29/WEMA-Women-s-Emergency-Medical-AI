app = "wema-women-s-emergency-medical-ai"
primary_region = "jnb"

[build]

[env]
  PORT = "8080"

[mounts]
  source = "wema_knowledge_base"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "30s"
  timeout = "25s"
  grace_period = "60s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1